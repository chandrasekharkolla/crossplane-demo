apiVersion: v1
kind: ConfigMap
metadata:
  name: backstage-templates
  namespace: backstage
data:
  skeleton-crossplane.yaml: |
    apiVersion: platform.example.org/v1alpha1
    kind: KubernetesApp
    metadata:
      name: ${{ values.appName }}
      namespace: ${{ values.namespace }}
    spec:
      appName: ${{ values.appName }}
      namespace: ${{ values.namespace }}
      environment: ${{ values.environment }}
      image: ${{ values.image }}
      replicas: ${{ values.replicas }}
      imagePullPolicy: ${{ values.imagePullPolicy }}
      cpu: ${{ values.cpu }}
      memory: ${{ values.memory }}
      serviceType: ${{ values.serviceType }}
      exposeIngress: ${{ values.exposeIngress }}
      hostname: ${{ values.hostname }}
      kubernetesVersion: "${{ values.kubernetesVersion }}"
      enableHPA: ${{ values.enableHPA }}
      enablePDB: ${{ values.enablePDB }}
      enableNetworkPolicy: ${{ values.enableNetworkPolicy }}

  app-config.local.yaml: |
    catalog:
      locations:
        # Backstage example components
        - type: url
          target: https://github.com/backstage/backstage/tree/master/packages/catalog-model/examples/all-components.yaml
        # Example component for github-actions and TechDocs
        - type: url
          target: https://github.com/backstage/backstage/tree/master/plugins/github-actions/examples/sample.yaml
        # Example component for TechDocs
        - type: url
          target: https://github.com/backstage/backstage/tree/master/plugins/techdocs-backend/examples/documented-component/catalog-info.yaml
        # Backstage example APIs
        - type: url
          target: https://github.com/backstage/backstage/tree/master/packages/catalog-model/examples/all-apis.yaml
        # Backstage example resources
        - type: url
          target: https://github.com/backstage/backstage/tree/master/packages/catalog-model/examples/all-resources.yaml
        # Backstage example systems
        - type: url
          target: https://github.com/backstage/backstage/tree/master/packages/catalog-model/examples/all-systems.yaml
        # Backstage example domains
        - type: url
          target: https://github.com/backstage/backstage/tree/master/packages/catalog-model/examples/all-domains.yaml
        # Backstage example templates
        - type: url
          target: https://github.com/backstage/backstage/tree/master/plugins/scaffolder-backend/sample-templates/all-templates.yaml
        # Backstage example groups and users
        - type: url
          target: https://github.com/backstage/backstage/tree/master/packages/catalog-model/examples/acme-corp.yaml
        # Our custom template
        - type: file
          target: /usr/src/app/templates/kubernetes-app.yaml

  kubernetes-app.yaml: |
    apiVersion: backstage.io/v1beta2
    kind: Template
    metadata:
      name: kubernetes-app
      title: Kubernetes Application
      description: Deploy a sample application to Kubernetes
    spec:
      owner: platform-team
      type: service

      parameters:
        - title: Application Details
          required:
            - appName
            - namespace
            - environment

          properties:
            appName:
              title: Application Name
              type: string
              description: Name of the Kubernetes application

            namespace:
              title: Namespace
              type: string
              default: default

            environment:
              title: Environment
              type: string
              enum:
                - dev
                - test
                - staging
                - prod

        - title: Container Configuration
          required:
            - image

          properties:
            image:
              title: Container Image
              type: string
              default: nginx:latest

            replicas:
              title: Replicas
              type: integer
              default: 2
              minimum: 1
              maximum: 20

            imagePullPolicy:
              title: Image Pull Policy
              type: string
              enum:
                - Always
                - IfNotPresent
                - Never
              default: IfNotPresent

        - title: Resource Requests

          properties:
            cpu:
              title: CPU Request
              type: string
              default: 250m
              enum:
                - 100m
                - 250m
                - 500m
                - "1"

            memory:
              title: Memory Request
              type: string
              default: 512Mi
              enum:
                - 128Mi
                - 256Mi
                - 512Mi
                - 1Gi
                - 2Gi

        - title: Networking

          properties:
            serviceType:
              title: Service Type
              type: string
              enum:
                - ClusterIP
                - NodePort
                - LoadBalancer
              default: ClusterIP

            exposeIngress:
              title: Create Ingress?
              type: boolean
              default: false

            hostname:
              title: Hostname
              type: string
              description: Required if Ingress is enabled

              ui:options:
                visibleIf:
                  exposeIngress: true

        - title: Kubernetes Options

          properties:
            kubernetesVersion:
              title: Kubernetes Version
              type: string
              enum:
                - "1.29"
                - "1.30"
                - "1.31"

            enableHPA:
              title: Enable Horizontal Pod Autoscaler
              type: boolean
              default: false

            enablePDB:
              title: Create Pod Disruption Budget
              type: boolean
              default: true

            enableNetworkPolicy:
              title: Apply Default Network Policy
              type: boolean
              default: true

      steps:
        - id: fetch-template
          name: Generate Crossplane YAML
          action: fetch:template
          input:
            url: ./skeleton
            values:
              appName: ${{ parameters.appName }}
              namespace: ${{ parameters.namespace }}
              environment: ${{ parameters.environment }}
              image: ${{ parameters.image }}
              replicas: ${{ parameters.replicas }}
              imagePullPolicy: ${{ parameters.imagePullPolicy }}
              cpu: ${{ parameters.cpu }}
              memory: ${{ parameters.memory }}
              serviceType: ${{ parameters.serviceType }}
              exposeIngress: ${{ parameters.exposeIngress }}
              hostname: ${{ parameters.hostname }}
              kubernetesVersion: ${{ parameters.kubernetesVersion }}
              enableHPA: ${{ parameters.enableHPA }}
              enablePDB: ${{ parameters.enablePDB }}
              enableNetworkPolicy: ${{ parameters.enableNetworkPolicy }}

        - id: log
          name: Print Output Path
          action: debug:log
          input:
            message: "Successfully generated Crossplane YAML in the workspace!"

      output:
        text: |
          **Success:** Kubernetes deployment template generated successfully.
