apiVersion: v1
kind: ServiceAccount
metadata:
  name: backstage
  namespace: backstage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backstage-read
subjects:
  - kind: ServiceAccount
    name: backstage
    namespace: backstage
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: backstage
  labels:
    app: backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
    spec:
      serviceAccountName: backstage
      containers:
        - name: backstage
          image: roadiehq/community-backstage-image:latest
          ports:
            - containerPort: 7007
          env:
            - name: APP_CONFIG_backend_baseUrl
              value: http://localhost:7007
            - name: APP_CONFIG_backend_listen_port
              value: "7007"
          startupProbe:
            httpGet:
              path: /healthcheck
              port: 7007
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 7007
            periodSeconds: 10
          resources:
            requests:
              memory: 512Mi
              cpu: 500m
            limits:
              memory: 1Gi
              cpu: 1000m
          volumeMounts:
            - name: backstage-templates
              mountPath: /usr/src/app/templates/kubernetes-app.yaml
              subPath: kubernetes-app.yaml
            - name: backstage-templates
              mountPath: /usr/src/app/app-config.local.yaml
              subPath: app-config.local.yaml
      volumes:
        - name: backstage-templates
          configMap:
            name: backstage-templates
