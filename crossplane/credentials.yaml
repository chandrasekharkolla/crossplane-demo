apiVersion: v1
kind: Secret
metadata:
  name: aws-creds
  namespace: crossplane-system
type: Opaque
stringData:
  # Dummy credentials for Floci (local AWS emulator).
  # These are NOT real AWS keys — Floci accepts any value.
  creds: |
    [default]
    aws_access_key_id = test
    aws_secret_access_key = test
