version: '3'

vars:
  CLUSTER_NAME: crossplane-demo
  REPO_URL:
    sh: git remote get-url origin 2>/dev/null || echo ""
  DASHBOARD_PORT: 9877
  CROSSVIEW_PORT: 8080
  ARGOCD_PORT: 8443
  BACKSTAGE_PORT: 7007

tasks:
  default:
    desc: Show available tasks
    silent: true
    cmds:
      - task --list

  prereqs:
    desc: Install Docker, kind, kubectl, and Python if missing (auto-detects OS)
    cmds:
      - task: prereqs:docker
      - task: prereqs:kind
      - task: prereqs:kubectl
      - task: prereqs:python
      - echo ""
      - echo "All prerequisites installed. Verifying..."
      - docker --version
      - kind --version
      - kubectl version --client --short 2>/dev/null || kubectl version --client
      - python3 --version 2>/dev/null || python --version
      - echo ""
      - echo "Prerequisites ready. Run 'task setup' to bootstrap the platform."

  prereqs:docker:
    desc: Install Docker if not present
    status:
      - command -v docker
    cmds:
      - |
        OS="{{OS}}"
        case "$OS" in
          darwin)
            if command -v brew &>/dev/null; then
              echo "macOS detected. Choose a Docker runtime:"
              echo "  1) Docker Desktop (full GUI, default)"
              echo "  2) Colima + Docker CLI (lightweight, open-source)"
              read -rp "Enter choice [1]: " choice
              case "${choice:-1}" in
                2)
                  echo "Installing Colima and Docker CLI via Homebrew..."
                  brew install docker colima
                  echo "Starting Colima..."
                  colima start
                  ;;
                *)
                  echo "Installing Docker Desktop via Homebrew..."
                  brew install --cask docker
                  echo "Please open Docker Desktop from Applications to complete setup."
                  echo "Waiting for Docker daemon..."
                  for i in $(seq 1 30); do
                    docker info &>/dev/null && break
                    sleep 2
                  done
                  ;;
              esac
            else
              echo "ERROR: Homebrew not found. Install it first: https://brew.sh"
              exit 1
            fi
            ;;
          linux)
            if command -v apt-get &>/dev/null; then
              echo "Debian/Ubuntu detected. Installing Docker Engine..."
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin
              sudo usermod -aG docker "$USER"
              echo "Docker installed. You may need to log out and back in for group changes."
            elif command -v dnf &>/dev/null; then
              echo "Fedora/RHEL detected. Installing Docker Engine..."
              sudo dnf -y install dnf-plugins-core
              sudo dnf config-manager --add-repo https://download.docker.com/linux/fedora/docker-ce.repo
              sudo dnf install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker "$USER"
              echo "Docker installed. You may need to log out and back in for group changes."
            elif command -v yum &>/dev/null; then
              echo "CentOS/RHEL detected. Installing Docker Engine..."
              sudo yum install -y yum-utils
              sudo yum-config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
              sudo yum install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker "$USER"
              echo "Docker installed. You may need to log out and back in for group changes."
            else
              echo "ERROR: Unsupported Linux distribution. Install Docker manually: https://docs.docker.com/engine/install/"
              exit 1
            fi
            ;;
          windows)
            echo "Windows detected. Choose a Docker runtime:"
            echo "  1) Docker Desktop (full GUI, default)"
            echo "  2) Rancher Desktop (free, open-source, no license restrictions)"
            read -rp "Enter choice [1]: " choice
            case "${choice:-1}" in
              2)
                if command -v winget &>/dev/null; then
                  echo "Installing Rancher Desktop via winget..."
                  winget install -e --id suse.RancherDesktop --accept-package-agreements --accept-source-agreements
                elif command -v choco &>/dev/null; then
                  echo "Installing Rancher Desktop via Chocolatey..."
                  choco install rancher-desktop -y
                else
                  echo "ERROR: Neither winget nor choco found."
                  echo "Install Rancher Desktop manually: https://rancherdesktop.io/"
                  exit 1
                fi
                echo "Open Rancher Desktop and select 'dockerd (moby)' as the container runtime."
                ;;
              *)
                if command -v winget &>/dev/null; then
                  echo "Installing Docker Desktop via winget..."
                  winget install -e --id Docker.DockerDesktop --accept-package-agreements --accept-source-agreements
                elif command -v choco &>/dev/null; then
                  echo "Installing Docker Desktop via Chocolatey..."
                  choco install docker-desktop -y
                else
                  echo "ERROR: Neither winget nor choco found."
                  echo "Install Docker Desktop manually: https://docs.docker.com/desktop/install/windows-install/"
                  exit 1
                fi
                echo "Please open Docker Desktop to complete setup and enable WSL 2 integration."
                ;;
            esac
            ;;
          *)
            echo "ERROR: Unsupported OS '$OS'. Install Docker manually: https://docs.docker.com/get-docker/"
            exit 1
            ;;
        esac

  prereqs:kind:
    desc: Install kind if not present
    status:
      - command -v kind
    cmds:
      - |
        OS="{{OS}}"
        ARCH="{{ARCH}}"
        case "$OS" in
          darwin)
            if command -v brew &>/dev/null; then
              echo "Installing kind via Homebrew..."
              brew install kind
            else
              echo "Installing kind via binary download..."
              curl -Lo ./kind "https://kind.sigs.k8s.io/dl/latest/kind-darwin-${ARCH}"
              chmod +x ./kind
              sudo mv ./kind /usr/local/bin/kind
            fi
            ;;
          linux)
            echo "Installing kind via binary download..."
            curl -Lo ./kind "https://kind.sigs.k8s.io/dl/latest/kind-linux-${ARCH}"
            chmod +x ./kind
            sudo mv ./kind /usr/local/bin/kind
            ;;
          windows)
            echo "Windows detected."
            if command -v winget &>/dev/null; then
              echo "Installing kind via winget..."
              winget install -e --id Kubernetes.kind --accept-package-agreements --accept-source-agreements
            elif command -v choco &>/dev/null; then
              echo "Installing kind via Chocolatey..."
              choco install kind -y
            else
              echo "Installing kind via binary download..."
              curl -Lo kind.exe "https://kind.sigs.k8s.io/dl/latest/kind-windows-${ARCH}"
              mkdir -p "$HOME/bin"
              mv kind.exe "$HOME/bin/kind.exe"
              echo "Installed to $HOME/bin/kind.exe — ensure $HOME/bin is in your PATH."
            fi
            ;;
          *)
            echo "ERROR: Unsupported OS '$OS'. Install kind manually: https://kind.sigs.k8s.io/docs/user/quick-start/#installation"
            exit 1
            ;;
        esac
        echo "kind installed: $(kind --version)"

  prereqs:kubectl:
    desc: Install kubectl if not present
    status:
      - command -v kubectl
    cmds:
      - |
        OS="{{OS}}"
        ARCH="{{ARCH}}"
        case "$OS" in
          darwin)
            if command -v brew &>/dev/null; then
              echo "Installing kubectl via Homebrew..."
              brew install kubectl
            else
              echo "Installing kubectl via binary download..."
              KUBECTL_VERSION=$(curl -L -s https://dl.k8s.io/release/stable.txt)
              curl -Lo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/${OS}/${ARCH}/kubectl"
              chmod +x ./kubectl
              sudo mv ./kubectl /usr/local/bin/kubectl
            fi
            ;;
          linux)
            echo "Installing kubectl via binary download..."
            KUBECTL_VERSION=$(curl -L -s https://dl.k8s.io/release/stable.txt)
            curl -Lo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/${OS}/${ARCH}/kubectl"
            chmod +x ./kubectl
            sudo mv ./kubectl /usr/local/bin/kubectl
            ;;
          windows)
            echo "Windows detected."
            if command -v winget &>/dev/null; then
              echo "Installing kubectl via winget..."
              winget install -e --id Kubernetes.kubectl --accept-package-agreements --accept-source-agreements
            elif command -v choco &>/dev/null; then
              echo "Installing kubectl via Chocolatey..."
              choco install kubernetes-cli -y
            else
              echo "Installing kubectl via binary download..."
              KUBECTL_VERSION=$(curl -L -s https://dl.k8s.io/release/stable.txt)
              curl -Lo kubectl.exe "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/windows/${ARCH}/kubectl.exe"
              mkdir -p "$HOME/bin"
              mv kubectl.exe "$HOME/bin/kubectl.exe"
              echo "Installed to $HOME/bin/kubectl.exe — ensure $HOME/bin is in your PATH."
            fi
            ;;
          *)
            echo "ERROR: Unsupported OS. Install kubectl manually: https://kubernetes.io/docs/tasks/tools/"
            exit 1
            ;;
        esac
        echo "kubectl installed: $(kubectl version --client --short 2>/dev/null || kubectl version --client)"

  prereqs:python:
    desc: Install Python 3 if not present
    status:
      - command -v python3 || command -v python
    cmds:
      - |
        OS="{{OS}}"
        case "$OS" in
          darwin)
            if command -v brew &>/dev/null; then
              echo "Installing Python 3 via Homebrew..."
              brew install python
            else
              echo "ERROR: Homebrew not found. Install Python 3 manually: https://www.python.org/downloads/"
              exit 1
            fi
            ;;
          linux)
            if command -v apt-get &>/dev/null; then
              sudo apt-get update && sudo apt-get install -y python3
            elif command -v dnf &>/dev/null; then
              sudo dnf install -y python3
            elif command -v yum &>/dev/null; then
              sudo yum install -y python3
            else
              echo "ERROR: Unsupported Linux distribution. Install Python 3 manually."
              exit 1
            fi
            ;;
          windows)
            if command -v winget &>/dev/null; then
              echo "Installing Python 3 via winget..."
              winget install Python.Python.3 --accept-package-agreements --accept-source-agreements
            elif command -v choco &>/dev/null; then
              echo "Installing Python 3 via Chocolatey..."
              choco install python -y
            else
              echo "ERROR: Neither winget nor choco found. Install Python 3 manually: https://www.python.org/downloads/"
              exit 1
            fi
            ;;
          *)
            echo "ERROR: Unsupported OS '$OS'. Install Python 3 manually: https://www.python.org/downloads/"
            exit 1
            ;;
        esac
        echo "Python installed: $(python3 --version 2>/dev/null || python --version)"

  setup:
    desc: Bootstrap the platform (new kind cluster + ArgoCD + app-of-apps)
    preconditions:
      - sh: command -v docker
        msg: "docker is required. Run 'task prereqs' to install all dependencies."
      - sh: command -v kind
        msg: "kind is required. Run 'task prereqs' to install all dependencies."
      - sh: command -v kubectl
        msg: "kubectl is required. Run 'task prereqs' to install all dependencies."
      - sh: command -v python3 || command -v python
        msg: "Python 3 is required. Run 'task prereqs' to install all dependencies."
      - sh: docker info > /dev/null 2>&1
        msg: "Docker daemon is not running. Start Docker Desktop or run 'colima start'."
      - sh: '[ "{{.REPO_URL}}" != "https://github.com/OWNER/REPO" ]'
        msg: "Set REPO_URL in Taskfile.yml to your Git repo URL before running setup."
    cmds:
      - task: cluster
      - task: install

  install:
    desc: Install the platform on an existing cluster (ArgoCD + app-of-apps)
    preconditions:
      - sh: kubectl cluster-info > /dev/null 2>&1
        msg: "No cluster reachable. Check your kubeconfig or run 'task setup' for a new kind cluster."
      - sh: '[ "{{.REPO_URL}}" != "https://github.com/OWNER/REPO" ]'
        msg: "Set REPO_URL in Taskfile.yml to your Git repo URL before running install."
    cmds:
      - task: argocd
      - task: apps
      - echo ""
      - echo "Run 'task check' to verify all components are healthy."
      - echo "Opening all dashboards..."
      - task: argocd:open
      - task: dashboard
      - task: crossview:open
      - task: backstage:open

  cluster:
    desc: Create a kind cluster
    cmds:
      - echo "Creating kind cluster..."
      - kind create cluster --config kind/cluster.yaml
      - |
        echo "Waiting for cluster to be ready..."
        until kubectl get nodes --no-headers 2>/dev/null | grep -q ' Ready'; do
          sleep 2
        done
        echo "Waiting for core components..."
        kubectl wait --for=condition=Ready pods --all -n kube-system --timeout=120s
        echo "Cluster ready."
    status:
      - kind get clusters 2>/dev/null | grep -q {{.CLUSTER_NAME}}

  argocd:
    desc: Install Argo CD
    cmds:
      - kubectl create namespace argocd 2>/dev/null || true
      - echo "Installing Argo CD..."
      # The applicationsets CRD is too large for client-side apply
      - kubectl apply --server-side --force-conflicts -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
      - echo "Configuring Argo CD..."
      - kubectl apply -f argocd/crossplane-compat.yaml
      - echo "Waiting for Argo CD to be ready..."
      - kubectl rollout status deployment/argocd-server -n argocd --timeout=180s
      - kubectl rollout status statefulset/argocd-application-controller -n argocd --timeout=180s
      - echo "Argo CD installed."
    status:
      - kubectl get deployment argocd-server -n argocd -o jsonpath='{.status.readyReplicas}' 2>/dev/null | grep -q '1'

  apps:
    desc: Deploy the app-of-apps (ArgoCD syncs everything else)
    cmds:
      - |
        echo "Applying app-of-apps with repo URL: {{.REPO_URL}}"
        sed "s|REPO_URL_PLACEHOLDER|{{.REPO_URL}}|g" argocd/app-of-apps.yaml | kubectl apply -f -
      - |
        echo "Applying individual apps..."
        for f in apps/*.yaml; do
          sed "s|REPO_URL_PLACEHOLDER|{{.REPO_URL}}|g" "$f" | kubectl apply -f -
        done
      - echo "ArgoCD is now syncing all applications."

  demo:
    desc: Apply the sample EKSCluster Claim
    cmds:
      - echo "Creating sample EKS cluster..."
      - kubectl apply -f examples/claim.yaml
      - echo "Watching Claim status..."
      - |
        timeout=120
        elapsed=0
        while true; do
          ready=$(kubectl get ekscluster my-cluster --no-headers 2>/dev/null | awk '{print $2}' || true)
          if [ "$ready" = "True" ]; then
            echo "EKS cluster is ready!"
            break
          fi
          if [ "$elapsed" -ge "$timeout" ]; then
            echo "Cluster created. Check status with: task status"
            break
          fi
          echo "  READY: ${ready:-Pending}... ($elapsed s)"
          sleep 5
          elapsed=$((elapsed + 5))
        done

  status:
    desc: Show the Claim status and resource tree
    cmds:
      - echo "=== Claim Status ==="
      - kubectl get ekscluster -A
      - echo ""
      - echo "=== Resource Tree ==="
      - crossplane beta trace ekscluster my-cluster 2>/dev/null || echo "Install crossplane CLI for trace view"
      - echo ""
      - echo "=== Managed Resources ==="
      - kubectl get managed

  # --- Port-forward tasks for all dashboards ---

  argocd:open:
    desc: Open Argo CD UI (port-forward)
    cmds:
      - echo "Port-forwarding Argo CD to https://localhost:{{.ARGOCD_PORT}} in the background..."
      - |
        echo "Login with username: admin"
      - |
        echo -n "Password: "
      - kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d && echo
      - pkill -f "python.* -c.*argocd argocd-server" >/dev/null 2>&1 || true
      - pkill -f "port-forward -n argocd" >/dev/null 2>&1 || true
      - sleep 1
      - |
        PYTHON_CMD=$([ -x "$(command -v python3)" ] && echo "python3" || echo "python")
        ($PYTHON_CMD -c '
        import subprocess, time, signal, sys
        if hasattr(signal, "SIGHUP"):
            signal.signal(signal.SIGHUP, signal.SIG_IGN)
        ns, svc, ports = sys.argv[1], sys.argv[2], sys.argv[3]
        while True:
            p = subprocess.Popen(["kubectl", "port-forward", "-n", ns, f"svc/{svc}", ports], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
            p.wait()
            time.sleep(2)
        ' "argocd" "argocd-server" "{{.ARGOCD_PORT}}:443" & sleep 1)
      - open https://localhost:{{.ARGOCD_PORT}} 2>/dev/null || xdg-open https://localhost:{{.ARGOCD_PORT}} 2>/dev/null || start https://localhost:{{.ARGOCD_PORT}} 2>/dev/null || true

  argocd:password:
    desc: Get the Argo CD admin password
    cmds:
      - kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d && echo

  dashboard:
    desc: Open floci-dash — AWS resource view (port-forward)
    cmds:
      - echo "Waiting for floci-dash deployment to be ready..."
      - |
        until kubectl get deployment floci-dash -n floci >/dev/null 2>&1; do sleep 2; done
      - kubectl rollout status deployment/floci-dash -n floci --timeout=300s
      - echo "Port-forwarding floci-dash to http://localhost:{{.DASHBOARD_PORT}} in the background..."
      - pkill -f "python.* -c.*floci floci-dash" >/dev/null 2>&1 || true
      - pkill -f "port-forward -n floci" >/dev/null 2>&1 || true
      - sleep 1
      - |
        PYTHON_CMD=$([ -x "$(command -v python3)" ] && echo "python3" || echo "python")
        ($PYTHON_CMD -c '
        import subprocess, time, signal, sys
        if hasattr(signal, "SIGHUP"):
            signal.signal(signal.SIGHUP, signal.SIG_IGN)
        ns, svc, ports = sys.argv[1], sys.argv[2], sys.argv[3]
        while True:
            p = subprocess.Popen(["kubectl", "port-forward", "-n", ns, f"svc/{svc}", ports], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
            p.wait()
            time.sleep(2)
        ' "floci" "floci-dash" "{{.DASHBOARD_PORT}}:3000" & sleep 1)
      - open http://localhost:{{.DASHBOARD_PORT}} 2>/dev/null || xdg-open http://localhost:{{.DASHBOARD_PORT}} 2>/dev/null || start http://localhost:{{.DASHBOARD_PORT}} 2>/dev/null || true

  crossview:open:
    desc: Open Crossview — Crossplane resource view (port-forward)
    cmds:
      - echo "Waiting for crossview deployment to be ready..."
      - |
        until kubectl get deployment crossview -n crossview >/dev/null 2>&1; do sleep 2; done
      - kubectl rollout status deployment/crossview -n crossview --timeout=300s
      - echo "Port-forwarding Crossview to http://localhost:{{.CROSSVIEW_PORT}} in the background..."
      - pkill -f "python.* -c.*crossview crossview-service" >/dev/null 2>&1 || true
      - pkill -f "port-forward -n crossview" >/dev/null 2>&1 || true
      - sleep 1
      - |
        PYTHON_CMD=$([ -x "$(command -v python3)" ] && echo "python3" || echo "python")
        ($PYTHON_CMD -c '
        import subprocess, time, signal, sys
        if hasattr(signal, "SIGHUP"):
            signal.signal(signal.SIGHUP, signal.SIG_IGN)
        ns, svc, ports = sys.argv[1], sys.argv[2], sys.argv[3]
        while True:
            p = subprocess.Popen(["kubectl", "port-forward", "-n", ns, f"svc/{svc}", ports], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
            p.wait()
            time.sleep(2)
        ' "crossview" "crossview-service" "{{.CROSSVIEW_PORT}}:80" & sleep 1)
      - open http://localhost:{{.CROSSVIEW_PORT}} 2>/dev/null || xdg-open http://localhost:{{.CROSSVIEW_PORT}} 2>/dev/null || start http://localhost:{{.CROSSVIEW_PORT}} 2>/dev/null || true

  backstage:open:
    desc: Open Backstage developer portal (port-forward)
    cmds:
      - echo "Waiting for backstage deployment to be ready..."
      - |
        until kubectl get deployment backstage -n backstage >/dev/null 2>&1; do sleep 2; done
      - kubectl rollout status deployment/backstage -n backstage --timeout=300s
      - echo "Port-forwarding Backstage to http://localhost:{{.BACKSTAGE_PORT}} in the background..."
      - pkill -f "python.* -c.*backstage backstage" >/dev/null 2>&1 || true
      - pkill -f "port-forward -n backstage" >/dev/null 2>&1 || true
      - sleep 1
      - |
        PYTHON_CMD=$([ -x "$(command -v python3)" ] && echo "python3" || echo "python")
        ($PYTHON_CMD -c '
        import subprocess, time, signal, sys
        if hasattr(signal, "SIGHUP"):
            signal.signal(signal.SIGHUP, signal.SIG_IGN)
        ns, svc, ports = sys.argv[1], sys.argv[2], sys.argv[3]
        while True:
            p = subprocess.Popen(["kubectl", "port-forward", "-n", ns, f"svc/{svc}", ports], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
            p.wait()
            time.sleep(2)
        ' "backstage" "backstage" "{{.BACKSTAGE_PORT}}:7007" & sleep 1)
      - open http://localhost:{{.BACKSTAGE_PORT}} 2>/dev/null || xdg-open http://localhost:{{.BACKSTAGE_PORT}} 2>/dev/null || start http://localhost:{{.BACKSTAGE_PORT}} 2>/dev/null || true

  # --- Health and cleanup ---

  check:
    desc: Verify all components are running
    cmds:
      - echo "=== Kind Cluster ==="
      - kubectl cluster-info 2>/dev/null && echo "  Cluster OK" || echo "  Cluster NOT running"
      - echo ""
      - echo "=== Argo CD ==="
      - kubectl get pods -n argocd --no-headers 2>/dev/null | awk '{printf "  %-50s %s\n", $1, $3}' || echo "  Not installed"
      - echo ""
      - echo "=== ArgoCD Applications ==="
      - kubectl get applications -n argocd --no-headers 2>/dev/null | awk '{printf "  %-25s SYNC=%-10s HEALTH=%s\n", $1, $2, $3}' || echo "  None"
      - echo ""
      - echo "=== Crossplane ==="
      - kubectl get pods -n crossplane-system --no-headers 2>/dev/null | awk '{printf "  %-50s %s\n", $1, $3}' || echo "  Not installed"
      - echo ""
      - echo "=== Providers ==="
      - kubectl get providers --no-headers 2>/dev/null | awk '{printf "  %-30s INSTALLED=%-6s HEALTHY=%s\n", $1, $2, $3}' || echo "  None"
      - echo ""
      - echo "=== Functions ==="
      - kubectl get functions --no-headers 2>/dev/null | awk '{printf "  %-30s INSTALLED=%-6s HEALTHY=%s\n", $1, $2, $3}' || echo "  None"
      - echo ""
      - echo "=== Floci ==="
      - kubectl get pods -n floci --no-headers 2>/dev/null | awk '{printf "  %-30s %s\n", $1, $3}' || echo "  Not deployed"
      - echo ""
      - echo "=== Crossview ==="
      - kubectl get pods -n crossview --no-headers 2>/dev/null | awk '{printf "  %-30s %s\n", $1, $3}' || echo "  Not installed"
      - echo ""
      - echo "=== Backstage ==="
      - kubectl get pods -n backstage --no-headers 2>/dev/null | awk '{printf "  %-30s %s\n", $1, $3}' || echo "  Not deployed"
      - echo ""
      - echo "=== Platform ==="
      - |
        kubectl get xrd --no-headers 2>/dev/null | awk '{printf "  XRD: %s\n", $1}' || echo "  No XRDs"
      - |
        kubectl get compositions --no-headers 2>/dev/null | awk '{printf "  Composition: %s\n", $1}' || echo "  No Compositions"
      - echo ""
      - echo "=== Claims ==="
      - kubectl get ekscluster -A --no-headers 2>/dev/null | awk '{printf "  %-20s SYNCED=%-6s READY=%s\n", $2, $3, $4}' || echo "  None"

  uninstall:
    desc: Remove the platform from an existing cluster (keeps the cluster)
    cmds:
      - echo "Deleting EKS clusters (claims)..."
      - kubectl delete ekscluster --all 2>/dev/null || true
      - echo "Removing ArgoCD Applications..."
      - kubectl delete applications --all -n argocd 2>/dev/null || true
      - echo "Waiting for ArgoCD to clean up resources..."
      - sleep 10
      - echo "Removing ArgoCD..."
      - kubectl delete namespace argocd 2>/dev/null || true
      - echo "Removing remaining namespaces..."
      - kubectl delete namespace crossplane-system 2>/dev/null || true
      - kubectl delete namespace crossview 2>/dev/null || true
      - kubectl delete namespace floci 2>/dev/null || true
      - kubectl delete namespace backstage 2>/dev/null || true
      - echo "Removing cluster-scoped resources..."
      - kubectl delete clusterrolebinding backstage-read 2>/dev/null || true
      - kubectl delete xrd xeksclusters.platform.example.com 2>/dev/null || true
      - echo "Uninstall complete. Cluster is still running."

  teardown:
    desc: Delete the cluster and uninstall all software dependencies
    prompt: "WARNING: This will completely destroy the cluster AND uninstall Docker, kind, and kubectl from your system. Are you sure?"
    cmds:
      - task: uninstall
      - echo "Deleting kind cluster..."
      - kind delete cluster --name {{.CLUSTER_NAME}} 2>/dev/null || echo "Cluster already deleted."
      - task: teardown:softwares
      - echo "Done."

  teardown:softwares:
    desc: Uninstall Docker, kind, and kubectl (auto-detects OS)
    internal: true
    cmds:
      - |
        OS="{{OS}}"
        echo "Uninstalling kind and kubectl..."
        case "$OS" in
          darwin)
            if command -v brew &>/dev/null; then
              brew uninstall kind kubectl 2>/dev/null || true
            fi
            sudo rm -f /usr/local/bin/kind /usr/local/bin/kubectl
            ;;
          linux)
            sudo rm -f /usr/local/bin/kind /usr/local/bin/kubectl
            ;;
          windows)
            if command -v winget &>/dev/null; then
              winget uninstall Kubernetes.kind 2>/dev/null || true
              winget uninstall Kubernetes.kubectl 2>/dev/null || true
            fi
            if command -v choco &>/dev/null; then
              choco uninstall kind kubernetes-cli -y 2>/dev/null || true
            fi
            rm -f "$HOME/bin/kind.exe" "$HOME/bin/kubectl.exe"
            ;;
        esac
      - |
        OS="{{OS}}"
        echo "Uninstalling Docker/Container runtime..."
        case "$OS" in
          darwin)
            if command -v brew &>/dev/null; then
              brew uninstall docker colima 2>/dev/null || true
              brew uninstall --cask docker 2>/dev/null || true
            fi
            ;;
          linux)
            if command -v apt-get &>/dev/null; then
              sudo apt-get purge -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin docker-ce-rootless-extras 2>/dev/null || true
              sudo apt-get autoremove -y
            elif command -v dnf &>/dev/null; then
              sudo dnf remove -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin 2>/dev/null || true
            elif command -v yum &>/dev/null; then
              sudo yum remove -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin 2>/dev/null || true
            fi
            ;;
          windows)
            if command -v winget &>/dev/null; then
              winget uninstall Docker.DockerDesktop 2>/dev/null || true
              winget uninstall suse.RancherDesktop 2>/dev/null || true
            fi
            if command -v choco &>/dev/null; then
              choco uninstall docker-desktop rancher-desktop -y 2>/dev/null || true
            fi
            ;;
        esac
        echo "Software uninstallation complete."
